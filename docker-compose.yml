services:
  hermes-agent:
    image: ${HERMES_AGENT_IMAGE:-hermes-agent-local:main}
    build:
      context: .
      dockerfile: docker/hermes-agent/Dockerfile
      args:
        HERMES_AGENT_REF: ${HERMES_AGENT_REF:-main}
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      HERMES_HOME: /opt/data
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${HERMES_API_KEY:?Set HERMES_API_KEY in .env}
    ports:
      - ${HERMES_PORT:-18642}:8642
    volumes:
      - ${HERMES_DATA_ROOT:-./data}/hermes:/opt/data
      - ${HERMES_DATA_ROOT:-./data}/open-webui:/opt/open-webui
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8642/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    init: true
    restart: unless-stopped

  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      OPENAI_API_BASE_URL: http://hermes-agent:8642/v1
      OPENAI_API_KEY: ${HERMES_API_KEY:?Set HERMES_API_KEY in .env}
      BYPASS_EMBEDDING_AND_RETRIEVAL: "true"
      RAG_EMBEDDING_MODEL: ""
      RAG_RERANKING_MODEL: ""
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
      RAG_RERANKING_MODEL_AUTO_UPDATE: "false"
      ENABLE_EVALUATION_ARENA_MODELS: "false"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,hermes-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,hermes-agent}
    ports:
      - ${OPEN_WEBUI_PORT:-13000}:8080
    volumes:
      - ${HERMES_DATA_ROOT:-./data}/open-webui:/app/backend/data
    depends_on:
      hermes-agent:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 180s
    init: true
    restart: unless-stopped
